<textarea id="copyID" onclick="copy(this)" rows="16" cols="145">
@article{ ,
  abstract     = {Cloud offloading is an important technique for Internet of Things systems, as it allows devices with limited capabilities to access the powerful resources in the cloud when executing their applications. However, relying solely on the remote cloud is problematic, as the long access time from the far distance to the server makes real-time applications impossible to be executed. Multi-access edge computing addresses this by deploying cloud servers near the devices. The issue then becomes how to allocate devices between either remote cloud and multiaccess edge computing, based on the device requirements. In this paper, we propose a Breakout Local Search-based solution that, given our designed binary integer linear programming model of the offloading problem, finds a near-optimal configuration for allocating devices between the two cloud types. The proposal is based on iterating between exploiting the local optimum found so far and perturbation of the current solution to explore more the search space. A comparison study shows that our proposal is better than baseline and conventional algorithms, speeding up the total service delay of tasks by at least 30ms.},
  archive      = {J_TETC},
  author       = {Mina Kato and Tiago Koketsu Rodrigues and Nei Kato},
  doi          = {10.1109/TETC.2025.3598369},
  journal      = {IEEE Transactions on Emerging Topics in Computing},
  month        = {8},
  pages        = {1-11},
  shortjournal = {IEEE Trans. Emerg. Topics Comput.},
  title        = {Breakout local search solution to the offloading decision problem in a multi-access edge computing cloud-enabled network},
  year         = {2025},
}
