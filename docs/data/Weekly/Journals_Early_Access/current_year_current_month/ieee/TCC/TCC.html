<textarea id="copyID" onclick="copy(this)" rows="16" cols="145">
@article{ ,
  abstract     = {HPC-cloud is becoming popular as it allows supercomputers to provide computing service with parallelism and high performance based on public cloud technology. Moreover, supercomputers across organizations are forming a network to scale the computational and storage capability of their service. However, the distributed computing process in the supercomputer internet requires a large amount of data transmission and access, arousing privacy and control problems. In this paper, we propose HPCBL, a blockchain-enabled decentralized data computing architecture that ensures private data sharing and computing in the Supercomputer Internet. We also propose a decentralized authentication scheme that entitles users the full control of their anonymous identity to support user private interactions with the Supercomputing Internet. The scheme supports anonymous self-derivative credentials for pair-wised access control and user-optional accountability without a trusted arbiter. We implemented a HPCBL prototype to empirically assess its performance.},
  archive      = {J_TCC},
  author       = {Wei Shao and Lianhai Wang and Chunfu Jia and Jinpeng Wang and Shujiang Xu and Shuhui Zhang and Mingyue Li and Qizheng Wang},
  doi          = {10.1109/TCC.2025.3604606},
  journal      = {IEEE Transactions on Cloud Computing},
  month        = {9},
  pages        = {1-14},
  shortjournal = {IEEE Trans. Cloud Comput.},
  title        = {HPCBL: A privacy-preserving data computing model for the supercomputing internet},
  year         = {2025},
}
</textarea>
