(2025). Electromagnetic waves generated by a hybrid dielectric-plasmonic dimer. <em>SIAP</em>, <em>85</em>(5), 1949-1975. (<a href='https://doi.org/10.1137/24M1719682'>www</a>)
</summary>
<textarea id="copyID" onclick="copy(this)" rows="16" cols="145">
@article{ ,
  abstract     = {Abstract. We know that the electric field generated by a plasmonic nano-particle (with negative permittivity) is given as a polarization of the incident electric field. Similarly, the electric field produced by a dielectric nano-particle (with positive but high permittivity) is given as a polarization of the incident magnetic field. In this work, we demonstrate that a hybrid dimer—composed of two closely coupled nano-particles, one plasmonic and the other dielectric—can polarize both the incident electric and the magnetic fields. Consequently, such hybrid dimers have the potential to modify both the electric permittivity and magnetic permeability of the surrounding medium. However, this dual modification occurs only when the two nano-particles share common resonant frequencies. We derive the asymptotic expansion of the fields generated by these hybrid dimers in the subwavelength regime for incident frequencies near their shared resonant frequencies.},
  archive      = {J_SIAP},
  author       = {Xinlin Cao and Ahcene Ghandriche and Mourad Sini},
  doi          = {10.1137/24M1719682},
  journal      = {SIAM Journal on Applied Mathematics},
  month        = {10},
  number       = {5},
  pages        = {1949-1975},
  shortjournal = {SIAM J. Appl. Math.},
  title        = {Electromagnetic waves generated by a hybrid dielectric-plasmonic dimer},
  volume       = {85},
  year         = {2025},
}
</textarea>
</details></li>
<li><details>
<summary>
(2025). Asymptotic modeling of a skin effect in magnetic conductors. <em>SIAP</em>, <em>85</em>(5), 1927-1948. (<a href='https://doi.org/10.1137/25M1734336'>www</a>)
</summary>
<textarea id="copyID" onclick="copy(this)" rows="16" cols="145">
@article{ ,
  abstract     = {Abstract. We consider the time-harmonic Maxwell equations set on a domain made of two subdomains and , such that represents a magnetic conductor and represents a nonmagnetic material, and the relative magnetic permeability between the two materials is very high. Assuming smoothness for the interface between the subdomains and regularity of the data, the electric field solution of the Maxwell equations possesses an asymptotic expansion in powers of the parameter with profile terms rapidly decaying inside the magnetic conductor. We make explicit the first terms of this expansion. As an application of the asymptotic expansion we obtain the asymptotic behavior of a skin depth function that allows one to measure the boundary layer phenomenon at large relative permeability. As another application of this expansion we give elements of proof for the derivation of impedance boundary conditions (IBCs) up to the third order of approximation with respect to the parameter , and we prove error estimates for the IBCs.},
  archive      = {J_SIAP},
  author       = {Victor Péron},
  doi          = {10.1137/25M1734336},
  journal      = {SIAM Journal on Applied Mathematics},
  month        = {10},
  number       = {5},
  pages        = {1927-1948},
  shortjournal = {SIAM J. Appl. Math.},
  title        = {Asymptotic modeling of a skin effect in magnetic conductors},

}
