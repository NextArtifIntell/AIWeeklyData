<textarea id="copyID" onclick="copy(this)" rows="16" cols="145">
@article{ ,
  abstract     = {We applied micro-computed tomography, high-resolution cryo-scanning electron microscopy (SEM) combined with cathodoluminescence, and cryo-focused ion beam Milling-SEM to perform three-dimensional imaging of human atherosclerotic tissues with tens of nanometers resolution, under hydrated, near-native conditions with minimal sample processing. The same technology was applied to cultured macrophages exposed to cholesterol crystals, and the observations made on the macrophages were compared to those made on the pathological tissue. We observed that cholesterol crystal digestion and, eventually, cholesterol crystal clearance occurs in the advanced human plaques through cellular processing. Our findings suggest that cholesterol crystal disassembly occurs through the esterification of crystalline cholesterol to cholesteryl-ester in isolated volumes, whereby the ester aggregates into intra- and extracellular pools. The hypothesis is supported by the close similarity of the processes imaged in the human tissue and in the macrophages and is in agreement with earlier biochemical studies performed on cultured macrophages.},
  archive      = {J_PNAS},
  author       = {Capua-Shenkar, Jenny and Kaestner, Antonia and Rechav, Katya and Brumfeld, Vlad and Kaplan-Ashiri, Ifat and Varsano, Neta and Avinoam, Ori and Speter, Chen and Halak, Moshe and Kruth, Howard and Addadi, Lia},
  doi          = {10.1073/pnas.2510133122},
  journal      = {Proceedings of the National Academy of Sciences},
  month        = {9},
  number       = {37},
  pages        = {e2510133122},
  shortjournal = {Proc. Natl. Acad. Sci. USA},
  title        = {3D cryoimaging of cell-mediated cholesterol crystal clearance in human atherosclerotic lesions},
  volume       = {122},
  year         = {2025},
}

</summary>
<textarea id="copyID" onclick="copy(this)" rows="16" cols="145">
@article{ ,
  abstract     = {Chimaeras ( Holocephali ) are an understudied group of mostly deep-ocean cartilaginous fishes ( Chondrichthyes ) with unique characteristics that distinguish them from their distant relatives, sharks, skates, and rays. Unlike sharks, chimaeras lack scales and do not have serially replacing rows of serrated teeth crowned with enameloid. Instead, they possess a fused dentition of dentine tooth plates. Additionally, male chimaeras develop an articulated cartilaginous facial appendage, the tenaculum, which is covered in an arcade of tooth-like structures. These extraoral teeth remain poorly understood, and their evolutionary origin is unclear. We investigate the development of the tenaculum and its teeth throughout the ontogeny of the Spotted Ratfish, Hydrolagus colliei , to assess homology and convergence between this novel craniofacial feature and oral jaws. Our study aims to 1) describe the development of the tenaculum, 2) assess tenaculum tooth development in comparison to oral teeth and denticles, and 3) characterize the genes and tissues responsible for tenaculum tooth emergence. We found that juvenile male chimaeras develop a full tenaculum before tooth development is complete and that only mature males possess a fully toothed tenaculum. These extraoral teeth emerge from within the tenaculum rather than from the surrounding epithelium. We integrate our developmental data with fossil evidence of the tenacular dentition from the Carboniferous holocephalan Helodus simplex . Our findings show that the tenaculum is closely associated with the upper jaw and that tenacular dentition resembles separate shark-like oral tooth whorls more than modified dermal denticles.},
  archive      = {J_PNAS},
  author       = {Cohen, Karly E. and Coates, Michael I. and Fraser, Gareth J.},
  doi          = {10.1073/pnas.2508054122},
  journal      = {Proceedings of the National Academy of Sciences},
  month        = {9},
  number       = {37},
  pages        = {e2508054122},
  shortjournal = {Proc. Natl. Acad. Sci. USA},
  title        = {Teeth outside the jaw: Evolution and development of the toothed head clasper in chimaeras},
  volume       = {122},
  year         = {2025},
}
</textarea>
